<!-- ================================================================
  BLOQUE 2 - TRACKING DE CONVERSION (evento Lead)
  Pegar justo ANTES de </body>.
  Dispara "Lead" cuando alguien hace clic en un boton de WhatsApp,
  igual que en las otras dos paginas. Asi Meta optimiza tus campanas
  hacia gente que realmente te escribe, no solo que visita.
================================================================ -->
<script>
document.addEventListener('click', function(e){
  var a = e.target.closest('a[href*="wa.me"]');
  if (a && typeof fbq === 'function') { fbq('track', 'Lead'); }
});
</script>
